plugins {
    id 'java'
    id 'maven-publish'
    id 'me.champeau.jmh' version '0.7.3'
}

group = 'org.collection'
version = '0.1.0'
java {
    sourceCompatibility = JavaVersion.toVersion("25")
    targetCompatibility = JavaVersion.toVersion("25")
    toolchain {
        languageVersion.set(JavaLanguageVersion.of(25))
    }
    withSourcesJar()
}

compileJava.options.encoding = "UTF-8"
compileTestJava.options.encoding = "UTF-8"

repositories {
    mavenLocal()
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // JMH benchmark comparison baselines.
    // jctools-core        -> Unsafe-based (legacy, default JCTools queues)
    // jctools-core-jdk11  -> VarHandle-based (apples-to-apples comparison with var-queue)
    jmhImplementation 'org.jctools:jctools-core:4.0.6'
    jmhImplementation 'org.jctools:jctools-core-jdk11:4.0.6'
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }
    repositories {
        mavenLocal()
    }
}

tasks.register('perfTest', Test) {
    description = "Runs only performance tests"
    group = "verification"

    useJUnitPlatform {
        includeTags "perf"
    }

    // Show logs for perf tests
    testLogging {
        showStandardStreams = true
        events "passed", "skipped", "failed"
    }

    // Optional: use same classpath as normal tests
    classpath = sourceSets.test.runtimeClasspath
    testClassesDirs = sourceSets.test.output.classesDirs
}

test {
    useJUnitPlatform() {
        if (project.hasProperty("perf")) {
            includeTags "perf"
        } else {
            excludeTags "perf"
        }
    }
    if (project.hasProperty("perf")) {
        testLogging {
            showStandardStreams = true
            events "passed", "skipped", "failed"
        }
    }
    jvmArgs += "-Xshare:off"
    jvmArgs += '--enable-native-access=ALL-UNNAMED'
    jvmArgs += [
            "-javaagent:${configurations.testRuntimeClasspath.find { it.name.contains('mockito-core') }}"
    ]
}

// ---------------------------------------------------------------------------
// JMH configuration
// ---------------------------------------------------------------------------
// Benchmarks live in src/jmh/java and are isolated from the main `test` source
// set so that `./gradlew build` and `./gradlew test` remain fast.
//
// Usage:
//   Full run:   ./gradlew jmh
//   Smoke run:  ./gradlew jmh -PjmhInclude='.*Spsc.*' -PjmhFork=1 -PjmhWarmup=2 -PjmhIterations=3
//   Results:    build/reports/jmh/results.json
// ---------------------------------------------------------------------------
jmh {
    // Matches the existing test-task JVM args so numbers are comparable.
    jvmArgsAppend = [
            '-Xshare:off',
            '--enable-native-access=ALL-UNNAMED',
            '-XX:+AlwaysPreTouch'
    ]

    // Defensible defaults. Individual runs can override via -P properties.
    fork              = project.findProperty('jmhFork')?.toInteger()        ?: 3
    warmupIterations  = project.findProperty('jmhWarmup')?.toInteger()      ?: 5
    iterations        = project.findProperty('jmhIterations')?.toInteger()  ?: 10
    timeOnIteration   = project.findProperty('jmhTime')                     ?: '1s'
    warmup            = project.findProperty('jmhWarmupTime')               ?: '1s'

    if (project.hasProperty('jmhInclude')) {
        includes = [project.getProperty('jmhInclude')]
    }

    resultFormat = 'JSON'
    resultsFile  = project.file("${buildDir}/reports/jmh/results.json")

    includeTests = false
    failOnError  = true
}